<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Github Issue Tracker | Login</title>

    <!-- daisy ui + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <section class="mw-[550px] mt-25 w-4/12 mx-auto bg-[#FFFFFF] rounded-lg shadow-[#0000000c] border border-[#E4E4E7]">
        <div class="text-center mt-6">
            <div class="flex items-center justify-center mb-5">
                <img src="assets/github-logo.png" alt="">
            </div>
            <h2 class="text-[#1F2937] font-semibold text-[24px]">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] mb-5">Sign in to manage your issues</p>
        </div>
        <div class="flex items-center justify-center">
            <fieldset class="fieldset bg-[#FFFFFF]  rounded-box w-xs  p-4">

                <label class="label">Username</label>
                <input type="email" class="input" placeholder="Enter Your Username" />

                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Enter Your Password" />

                <button class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>

        <div class="text-center mt-5 p-5">
            <p class="text-[#64748B] text-[14px]">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] p-5 rounded-md">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
    </section>
</body>

</html>
